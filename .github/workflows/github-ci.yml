name: Go CI

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: ../actions/setup-go
      - name: Build
        run: go build ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: ../actions/setup-go
      - name: Run tests
        run: go test ./... -v

  lint:
    name: GolangCI-Lint
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: ../actions/setup-go
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v1.64
